<VirtualHost *:443>
    ServerName yourdomain.com
    DocumentRoot /var/www/flutter_web/build/web

    # Enable HTTP/2
    Protocols h2 http/1.1

    <Directory "/var/www/flutter_web/build/web">
        AllowOverride All
        Options Indexes FollowSymLinks
        Require all granted

        # Handle Flutter's PathUrlStrategy
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Mandatory headers for Wasm multi-threading
    Header set Cross-Origin-Embedder-Policy "credentialless"
    Header set Cross-Origin-Opener-Policy "same-origin"
</VirtualHost>
