name: Web4 Hybrid CI (Next.js + iOS Workspace)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Build the Next.js Web Application
  web-build:
    name: Build Web Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  # 2. Build and Analyze the iOS Workspace
  ios-build:
    name: Build & Analyze iOS
    needs: web-build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build and Analyze
        run: |
          # Automatically find your .xcworkspace file
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          
          # Fetch the first scheme from the workspace
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['workspace']['schemes'][0]")
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"

          # Perform the Analyze and Build
          xcodebuild clean build analyze \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -resultBundlePath BuildResults.xcresult \
            | xcbeautify && exit ${PIPESTATUS[0]}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web4-analysis-report
          path: BuildResults.xcresult
