<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubu-Hai | Web4 Application</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  
  <!-- App Meta -->
  <meta name="theme-color" content="#00d8ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="icon.png" />

  <script src="flutter.js" defer></script>
  <style>
    :root { --primary: #00d8ff; --secondary: #ff00c3; --bg: #0f0f0f; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; 
           display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    .logo-orb { width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%;
                background: radial-gradient(circle at 30% 30%, var(--primary), var(--secondary));
                box-shadow: 0 0 20px var(--primary); animation: glow 2s infinite alternate; }
    @keyframes glow { from { transform: scale(1); } to { transform: scale(1.05); } }
    .btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 20px; cursor: pointer; margin: 5px; transition: 0.3s; }
    .btn:hover { background: var(--primary); color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-orb"></div>
    <h1>Kubu-Hai Portal</h1>
    <p id="status">Syncing with Web4 Infrastructure...</p>
    <div id="loader" style="width: 30px; height: 30px; border: 3px solid #fff; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; margin: 20px auto;"></div>
    <button class="btn" onclick="toggleVoice()">🎙️ AI Voice</button>
  </div>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }

    // Flutter Bootloader
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
          document.getElementById('loader').style.display = 'none';
          document.getElementById('status').innerText = 'System Online';
        }
      });
    });

    function toggleVoice() { alert('AI Voice Assistant Active'); }
  </script>
  <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
